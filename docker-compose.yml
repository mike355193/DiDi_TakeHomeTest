services:
  didi:
    container_name: didi-api
    image: ${DOCKER_REGISTRY-}didi
    build:
      context: DiDi
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=mssql,1433;Database=DiDi;User Id=sa;Password=Your_strong_password123;TrustServerCertificate=True
      Database__EnsureCreatedOnStartup: "true"
      Redis__ConnectionString: redis:6379
    ports:
      - "5009:8080"
    depends_on:
      mssql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - didi_network

  mssql:
    container_name: didi-mssql
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: Your_strong_password123
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - ./DiDi/mssql/data:/var/opt/mssql/data
      - ./DiDi/mssql/log:/var/opt/mssql/log
      - ./DiDi/mssql/secrets:/var/opt/mssql/secrets
    healthcheck:
      test: ["CMD-SHELL", "(/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Your_strong_password123 -C -Q \"SELECT 1\" || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P Your_strong_password123 -Q \"SELECT 1\") || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - didi_network

  redis:
    container_name: didi-redis
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./DiDi/redis:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - didi_network

networks:
  didi_network:
    name: didi_network
    driver: bridge
